schema_version: 1
name: auto_tuning_skill
version: 0.1.0
scope: computational-math
description: Design and run approved parameter searches for reproduced computational math experiments.
entrypoint: SKILL.md
requires_env:
  conda: ai4math
requires_tools:
  - python
requires_skills:
  - repo_reproduction_skill
  - failure_diagnosis_skill
input_artifacts:
  - approved_tuning_plan
  - parameter_space
  - execution_command
  - metric_definition
output_artifacts:
  - tuning/tuning_results.csv
  - tuning/best_parameters.json
  - tuning/tuning.log
  - tuning/TUNING_SUMMARY.md
approval_required_for:
  - tuning_run
  - budget_expansion
  - dependency_change
risk_level: medium

