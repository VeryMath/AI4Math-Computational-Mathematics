schema_version: 1
name: computational_math_reproduction_workflow_skill
version: 0.1.0
scope: computational-math
description: Default entrypoint for Skill-first computational math reproduction, tuning, visualization, and reporting workflows.
entrypoint: SKILL.md
requires_env:
  conda: ai4math
requires_tools:
  - agent-native-file-inspection
  - agent-native-shell
requires_skills:
  - computational_math_domain_skill
  - algorithm_discovery_skill
  - repo_reproduction_skill
  - environment_deployment_skill
  - continuous_optimization_skill
  - matlab_environment_setup_skill
  - matlab_runtime_skill
  - failure_diagnosis_skill
  - auto_tuning_skill
  - visualization_skill
  - report_generation_skill
  - human_review_skill
input_artifacts:
  - user_goal
  - optional_source_path
  - optional_remote_repository
output_artifacts:
  - plan.md
  - logs/run.log
  - RUN_SUMMARY.md
  - optional_repair_plan.md
  - optional_tuning_artifacts
approval_required_for:
  - external_code_execution
  - source_edit
  - dependency_change
  - tuning_run
  - final_conclusion
risk_level: medium
